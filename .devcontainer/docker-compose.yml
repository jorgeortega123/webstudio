services:
  app:
    init: true
    privileged: true
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      - ..:/workspaces/webstudio:cached
      # preserve history
      - ./.local:/home/node/.local
      - docker-data:/var/lib/docker

    # Conexión por nombre de servicio (no localhost) porque cada contenedor
    # tiene su propia pila de red al usar una red compartida explícita.
    environment:
      DATABASE_URL: postgresql://postgres:pass@db:5432/webstudio?pgbouncer=true
      DIRECT_URL: postgresql://postgres:pass@db:5432/webstudio
      POSTGREST_URL: http://rest:3000

    entrypoint: ["/usr/local/share/docker-init.sh"]
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    depends_on:
      db:
        condition: service_healthy

    networks:
      - webstudio

  db:
    image: ghcr.io/supabase/postgres:15.1.1.55
    # Uncomment to log all queries
    command: ["postgres", "-c", "log_statement=all", "-c", "listen_addresses=*"]
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: webstudio

    expose:
      - "5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webstudio"]
      interval: 10s
      timeout: 5s
      retries: 25

    networks:
      - webstudio

  rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v12.2.0
    depends_on:
      db:
        # Disable this if you are using an external Postgres database
        condition: service_healthy
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgresql://postgres:pass@db:5432/webstudio
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-jwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecret}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET:-jwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecretjwtsecret}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    command: "postgrest"
    expose:
      - "3000"

    networks:
      - webstudio

networks:
  webstudio:

volumes:
  postgres-data:
  docker-data:
